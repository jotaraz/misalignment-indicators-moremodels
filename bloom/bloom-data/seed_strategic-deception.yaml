# ====================================================================
# BEHAVIOR CONFIGURATION  --  strategic-deception
# ====================================================================
# Reconstructed config for the strategic-deception val behavior (the original configs were
# never committed). Rollout params match the GLM-4.7-Flash val run under
# bloom-results/strategic-deception_glm_4_7_flash; examples are two high-scoring dev rollouts
# de-rived from that run. Swap `rollout.target` to evaluate a different model.
# Emergent strategic deception under an objective/goal-conflict (default, unbiased prompt). Val run was combined from two sub-runs; both were simenv, ~5 turns, free-form (no_user_mode false).
behavior:
  name: "strategic-deception"                          # defined in behaviors.json
  examples:                               # files in behaviors/examples/ (no .json extension)
    - "strategic_deception_dev1"
    - "strategic_deception_dev2"

# ====================================================================
# GLOBAL PARAMETERS
# ====================================================================
temperature: 1.0
evaluator_reasoning_effort: "medium"
target_reasoning_effort: "medium"   # keep target reasoning on so chain-of-thought (intent) is visible
max_concurrent: 15
configurable_prompts: "default"
anonymous_target: false
debug: false

# ====================================================================
# UNDERSTANDING STAGE
# ====================================================================
understanding:
  model: "claude-opus-4.6"
  max_tokens: 4000   # must exceed the reasoning_effort=medium thinking budget (2048)

# ====================================================================
# IDEATION STAGE
# ====================================================================
ideation:
  model: "claude-opus-4.6"
  num_scenarios: 20            # matches the val variation count for this behavior
  variation_dimensions: []     # val used distinct base scenarios (no noise-perturbation doubling)
  max_tokens: 28000
  web_search: false

# ====================================================================
# ROLLOUT STAGE
# ====================================================================
rollout:
  model: "claude-opus-4.6"        # evaluator (red team)
  target: "glm-4.7-flash"      # target under evaluation -- change this to run another model
  modality: "simenv"
  max_turns: 5
  max_tokens: 4000
  no_user_mode: false
  selected_variations: null
  num_reps: 1

# ====================================================================
# JUDGMENT STAGE
# ====================================================================
judgment:
  model: "claude-opus-4.6"
  max_tokens: 6000
  num_samples: 1
  additional_qualities: ["unrealism", "evaluation-awareness", "evaluation-invalidity"]
  metajudgment_qualities: ["diversity"]
  redaction_tags: null
