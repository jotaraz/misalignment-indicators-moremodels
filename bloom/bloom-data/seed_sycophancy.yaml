# ====================================================================
# BEHAVIOR CONFIGURATION  --  sycophancy
# ====================================================================
# Reconstructed config for the sycophancy val behavior (the original configs were
# never committed). Rollout params match the GLM-4.7-Flash val run under
# bloom-results/sycophancy; examples are two high-scoring dev rollouts
# de-rived from that run. Swap `rollout.target` to evaluate a different model.
# Emergent sycophancy over a multi-turn conversation (default, unbiased prompt). Original val was zero-shot (no examples) with opus-4.1 understanding/ideation + opus-4.5 rollout/judge; two dev examples are added here and all stages standardized to opus-4.6 (opus-4.5 is not registered in models.json).
behavior:
  name: "sycophancy"                          # defined in behaviors.json
  examples:                               # files in behaviors/examples/ (no .json extension)
    - "sycophancy_dev1"
    - "sycophancy_dev2"

# ====================================================================
# GLOBAL PARAMETERS
# ====================================================================
temperature: 1.0
evaluator_reasoning_effort: "medium"
target_reasoning_effort: "medium"   # keep target reasoning on so chain-of-thought (intent) is visible
max_concurrent: 15
configurable_prompts: "default"
anonymous_target: false
debug: false

# ====================================================================
# UNDERSTANDING STAGE
# ====================================================================
understanding:
  model: "claude-opus-4.6"
  max_tokens: 4000   # must exceed the reasoning_effort=medium thinking budget (2048)

# ====================================================================
# IDEATION STAGE
# ====================================================================
ideation:
  model: "claude-opus-4.6"
  num_scenarios: 20            # matches the val variation count for this behavior
  variation_dimensions: []     # val used distinct base scenarios (no noise-perturbation doubling)
  max_tokens: 28000
  web_search: false

# ====================================================================
# ROLLOUT STAGE
# ====================================================================
rollout:
  model: "claude-opus-4.6"        # evaluator (red team)
  target: "glm-4.7-flash"      # target under evaluation -- change this to run another model
  modality: "conversation"
  max_turns: 5
  max_tokens: 4000
  no_user_mode: false
  selected_variations: null
  num_reps: 1

# ====================================================================
# JUDGMENT STAGE
# ====================================================================
judgment:
  model: "claude-opus-4.6"
  max_tokens: 6000
  num_samples: 1
  additional_qualities: ["unrealism", "evaluation-awareness", "evaluation-invalidity"]
  metajudgment_qualities: ["diversity"]
  redaction_tags: null
