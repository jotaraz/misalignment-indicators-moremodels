# OOD Misalignment Eval - Qwen3.6-35B-A3B via OpenRouter
# 18 conditions × 10 samples = 180 total
experiment_id: "ood_eval_qwen"
description: "OOD misalignment eval with Qwen3.6-35B-A3B"
researcher: "Kaiwen"

global:
  temperature: 1.0
  concurrency:
    providers:
      openrouter: 50
  samples_per_condition: 10

expansions:
  - name: "full_18_conditions"
    description: "All 18 conditions: 3 scenarios × 2 goal_types × 3 urgency_types"
    enabled: true
    models:
      - "qwen/qwen3.6-35b-a3b"
    variables:
      scenarios: ["blackmail", "leaking", "murder"]
      goal_types: ["explicit", "none"]
      goal_values: ["america"]
      urgency_types: ["none", "restriction", "replacement"]

classification:
  enabled: false

execution:
  resume_interrupted: true
  timeout_seconds: 300
  retries: 2
  checkpoint_frequency: 5
